- name: install packages
  hosts: local
  connection: local
  become: yes
  tasks:
    - name: Install all below packages
      ansible.builtin.package:
        name: "{{ item.name }}"
        state: "{{ item.latest }}"
      loop:
        - { name: "nginx" , state: "absent"}
        - { name: "mysql", state: "absent"}
        - { name: "zip", state: "latest"}
